<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="icon" href="images/foyle-logo.png" type="image/png">
  <title>Page Not Found — Foyle International</title>
  <meta name="description" content="The page you're looking for couldn't be found. Return to Foyle International — English language school in Derry, Northern Ireland.">
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Newsreader:ital,opsz,wght@0,6..72,400;1,6..72,400&family=Instrument+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --foyle-green: #3FA535;
      --foyle-green-dark: #2d7a25;
      --foyle-green-deep: #1a4f18;
      --foyle-green-pale: #f0f9ee;
      --cream: #faf8f3;
      --ink: #1a1a18;
      --ink-soft: #545450;
      --rule: #e2ddd0;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Newsreader', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .logo-wrap {
      margin-bottom: 3rem;
    }

    .logo-wrap img {
      height: 52px;
      width: auto;
    }

    .error-num {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 400;
      line-height: 1;
      color: var(--foyle-green);
      opacity: 0.18;
      letter-spacing: -0.04em;
      margin-bottom: -1rem;
    }

    h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 400;
      line-height: 1.25;
      margin-bottom: 1rem;
    }

    h1 em {
      font-style: italic;
      color: var(--foyle-green-dark);
    }

    p {
      font-size: 1.1rem;
      color: var(--ink-soft);
      max-width: 38ch;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .btn {
      display: inline-block;
      background: var(--foyle-green);
      color: #fff;
      font-family: 'Instrument Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.875rem 2rem;
      border-radius: 100px;
      transition: background 0.2s;
    }

    .btn:hover {
      background: var(--foyle-green-dark);
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--rule);
      margin: 2.5rem auto;
    }

    .contact-line {
      font-family: 'Instrument Sans', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    .contact-line a {
      color: var(--foyle-green-dark);
      text-decoration: none;
    }

    .contact-line a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="logo-wrap">
    <a href="index.html">
      <img src="images/foyle-logo.png" alt="Foyle International">
    </a>
  </div>

  <div class="error-num">404</div>

  <h1>This page <em>doesn't exist</em></h1>

  <p>The page you're looking for may have moved or the link may be incorrect. Head back to the homepage.</p>

  <a href="index.html" class="btn">Back to homepage</a>

  <div class="divider"></div>

  <p class="contact-line">Need help? <a href="index.html#contact">Contact us</a> · <a href="mailto:info@foyle.eu">info@foyle.eu</a></p>

</body>
</html>
